<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc"><title id="title">Why ExpertFlow ships static residency</title><desc id="desc">Predictive caching was simulated and rejected. Measured full static Q6 residency produced the shipped result.</desc><defs><linearGradient id="b"><stop stop-color="#0b3d20"/><stop offset="1" stop-color="#101311"/></linearGradient></defs><rect width="1200" height="430" rx="24" fill="url(#b)"/><style>text{font-family:Segoe UI,Arial,sans-serif}.m{font-family:Consolas,monospace}.h{font-size:28px;font-weight:800}.m1{font-size:20px;font-weight:700}.s{font-size:15px}</style><text x="60" y="62" class="h" fill="#f4f2e9">THE MEASURED DECISION</text><text x="1140" y="58" text-anchor="end" class="m s" fill="#9fb9a5">ORIGINAL IDEA ≠ SHIPPED ANSWER</text><circle cx="115" cy="210" r="34" fill="#101311" stroke="#d6a84a" stroke-width="3"/><text x="115" y="216" text-anchor="middle" class="m" fill="#d6a84a">Q6</text><path d="M149 210h145m0 0 80-92h190m-270 92 80 100h190" fill="none" stroke="#4fbf68" stroke-width="4"/><circle cx="294" cy="210" r="7" fill="#d6a84a"/><rect x="564" y="73" width="555" height="110" rx="10" fill="#101311" stroke="#bf665e" stroke-width="2"/><text x="600" y="112" class="m1" fill="#bf665e">PREDICTIVE CACHE</text><text x="600" y="143" class="m s" fill="#9fb9a5">SIMULATED · NO CACHE OPPORTUNITY</text><path d="M1040 95l52 65m0-65-52 65" stroke="#bf665e" stroke-width="5"/><rect x="564" y="253" width="555" height="110" rx="10" fill="#101311" stroke="#d6a84a" stroke-width="3"/><text x="600" y="293" class="m1" fill="#8cf59b">FULL STATIC RESIDENCY</text><text x="600" y="324" class="m s" fill="#f4f2e9">MEASURED · 28.13 TPS · +22.48%</text><circle cx="1064" cy="308" r="18" fill="#0b3d20" stroke="#8cf59b" stroke-width="3"/><path d="m1055 308 7 8 13-18" fill="none" stroke="#8cf59b" stroke-width="4"/></svg>
