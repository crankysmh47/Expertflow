<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="t d"><title id="t">ExpertFlow optimization decision</title><desc id="d">Measured routing informed a simulation, which rejected predictive caching and selected full residency.</desc><rect width="1200" height="260" rx="28" fill="#08111f"/><style>text{font-family:Segoe UI,Arial,sans-serif}.h{font-weight:700;font-size:22px}.n{font-size:17px}</style><g fill="#142338" stroke="#36506d" stroke-width="2"><rect x="45" y="80" width="245" height="95" rx="16"/><rect x="370" y="80" width="245" height="95" rx="16"/><rect x="695" y="80" width="200" height="95" rx="16"/><rect x="975" y="80" width="180" height="95" rx="16"/></g><g class="n" text-anchor="middle"><text x="167" y="120" fill="#e7eef8">Measured routing</text><text x="167" y="148" fill="#9fb0c5">and transfer costs</text><text x="492" y="120" fill="#e7eef8">Capacity simulation</text><text x="492" y="148" fill="#ffcc66">NO CACHE OPPORTUNITY</text><text x="795" y="120" fill="#e7eef8">Reject prediction</text><text x="795" y="148" fill="#9fb0c5">for this GPU</text><text x="1065" y="120" fill="#5eead4">Ship full</text><text x="1065" y="148" fill="#5eead4">residency</text></g><g stroke="#5eead4" stroke-width="4"><path d="M290 127H365"/><path d="M615 127H690"/><path d="M895 127H970"/></g><text x="45" y="45" class="h" fill="#e7eef8">The optimizer can say no.</text><text x="45" y="220" class="n" fill="#9fb0c5">Cache result is simulated, not a measured live-cache speed claim.</text></svg>
