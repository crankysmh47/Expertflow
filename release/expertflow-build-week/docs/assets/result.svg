<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="t d"><title id="t">Stock versus ExpertFlow throughput</title><desc id="d">ExpertFlow reaches 28.13 decode tokens per second compared with 22.967 for stock.</desc><rect width="1200" height="300" rx="28" fill="#08111f"/><style>text{font-family:Segoe UI,Arial,sans-serif}.h{font-weight:700;font-size:26px}.v{font-weight:700;font-size:34px}.n{font-size:17px}</style><text x="55" y="55" class="h" fill="#e7eef8">Same Q6 model. Same 16 GB GPU. Better placement.</text><text x="55" y="122" class="n" fill="#9fb0c5">STOCK</text><rect x="170" y="90" width="620" height="48" rx="12" fill="#52657a"/><text x="815" y="125" class="v" fill="#c8d3df">22.967 TPS</text><text x="55" y="210" class="n" fill="#5eead4">EXPERTFLOW</text><rect x="170" y="178" width="760" height="48" rx="12" fill="#5eead4"/><text x="955" y="213" class="v" fill="#5eead4">28.13 TPS</text><text x="55" y="270" class="h" fill="#ffcc66">+22.48%</text><text x="205" y="270" class="n" fill="#9fb0c5">against the strongest fair stock Q6 configuration</text></svg>
