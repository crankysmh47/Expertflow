<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">ExpertFlow matched Q6 performance result</title><desc id="desc">ExpertFlow measured 28.13 decode TPS, 22.48 percent faster than stock at 22.967 TPS, on a 16 GB RTX 5060 Ti.</desc>
  <defs><linearGradient id="bg" x2="1"><stop stop-color="#101311"/><stop offset="1" stop-color="#0b3d20"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1200" height="420" rx="24" fill="url(#bg)"/>
  <g stroke="#4fbf68" fill="none" opacity=".45" stroke-width="2"><path d="M0 70h170l45 45h150"/><path d="M1200 340h-190l-45-45H805"/><path d="M1040 0v60l-35 35h-90"/></g>
  <style>text{font-family:Segoe UI,Arial,sans-serif}.mono{font-family:Consolas,monospace}.k{font-size:14px;letter-spacing:2px}.big{font-size:98px;font-weight:850}.mid{font-size:34px;font-weight:750}</style>
  <text x="70" y="70" class="k mono" fill="#8cf59b">MEASURED / TEN MATCHED 512-TOKEN RUNS</text><text x="70" y="184" class="big" fill="#d6a84a">28.13</text><text x="445" y="175" class="mid" fill="#f4f2e9">DECODE TPS</text><text x="73" y="224" class="mono" font-size="18" fill="#9fb9a5">EXPERTFLOW · GEMMA 4 26B A4B IT · Q6_K</text>
  <path d="M75 286h650" stroke="#242925" stroke-width="30"/><path d="M75 286h562" stroke="#8cf59b" stroke-width="30" filter="url(#g)"/><circle cx="637" cy="286" r="10" fill="#d6a84a"/><text x="75" y="340" class="mid" fill="#f4f2e9">22.967 <tspan class="k mono" fill="#9fb9a5">STOCK TPS</tspan></text>
  <rect x="790" y="105" width="340" height="210" rx="12" fill="#101311" stroke="#d6a84a" stroke-width="3"/><text x="960" y="185" text-anchor="middle" class="big" font-size="70" fill="#8cf59b">+22.48%</text><text x="960" y="226" text-anchor="middle" class="k mono" fill="#f4f2e9">VERSUS STRONGEST FAIR STOCK</text><text x="960" y="275" text-anchor="middle" class="mono" font-size="17" fill="#d6a84a">RTX 5060 Ti · 16 GB</text>
</svg>
