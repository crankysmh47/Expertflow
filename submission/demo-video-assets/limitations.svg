<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc"><title id="title">ExpertFlow evidence boundaries</title><desc id="desc">The release states its perplexity, determinism, context, simulation, and platform limitations.</desc><rect width="1920" height="1080" fill="#101311"/><style>text{font-family:Segoe UI,Arial,sans-serif}.m{font-family:Consolas,monospace}.h{font-size:60px;font-weight:800}.n{font-size:28px;font-weight:700}.s{font-size:22px}</style><text x="120" y="130" class="h" fill="#f4f2e9">WHAT THE RESULT DOES NOT CLAIM</text><text x="120" y="190" class="m s" fill="#d6a84a">EVIDENCE BOUNDARIES / SHIPPED WITH THE PRODUCT</text><g fill="#0b3d20" stroke="#4fbf68" stroke-width="3"><path d="M120 300h1680v120H120zM120 455h1680v120H120zM120 610h1680v120H120zM120 765h1680v120H120z"/></g><g class="n" fill="#f4f2e9"><text x="165" y="350">PPL</text><text x="165" y="505">CONCURRENCY</text><text x="165" y="660">CONTEXT</text><text x="165" y="815">CACHE + PLATFORM</text></g><g class="m s" fill="#9fb9a5"><text x="570" y="350">STRICT +1% CONFIDENCE GATE WAS NOT MET</text><text x="570" y="505">FOUR-SLOT OUTPUTS WERE NOT FULLY DETERMINISTIC</text><text x="570" y="660">262,144 ALLOCATED · 417 TOKENS PROCESSED</text><text x="570" y="805">PREDICTIVE CACHE WAS SIMULATED AND REJECTED</text><text x="570" y="845">LIVE SPEEDUP VERIFIED ON WINDOWS + NVIDIA ONLY</text></g><circle cx="1740" cy="360" r="13" fill="#bf665e"/><circle cx="1740" cy="515" r="13" fill="#bf665e"/><circle cx="1740" cy="670" r="13" fill="#bf665e"/><circle cx="1740" cy="825" r="13" fill="#bf665e"/></svg>
