<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Stock and ExpertFlow execution paths</title><desc id="desc">Stock crosses the CPU boundary for expert math. ExpertFlow keeps selected complete expert banks on CUDA.</desc>
  <defs><linearGradient id="board" x2="1" y2="1"><stop stop-color="#0b3d20"/><stop offset="1" stop-color="#101311"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1200" height="500" rx="24" fill="url(#board)"/><g fill="none" stroke="#4fbf68" stroke-width="2" opacity=".35"><path d="M0 55h130l36 36h280"/><path d="M1200 438h-165l-42-42H760"/><path d="M86 500V430l42-42h125"/><path d="M1110 0v68l-35 35H930"/></g>
  <style>text{font-family:Segoe UI,Arial,sans-serif}.mono{font-family:Consolas,monospace}.head{font-weight:800;font-size:24px;letter-spacing:2px}.node{fill:#101311;stroke:#9fb9a5;stroke-width:2}.hot{stroke:#d6a84a;stroke-width:3}.label{font-size:18px;font-weight:650}.small{font-size:14px}</style>
  <text x="60" y="62" class="head" fill="#bf665e">STOCK / CROSS-BACKEND</text><text x="60" y="282" class="head" fill="#d6a84a">EXPERTFLOW / CUDA-RESIDENT</text>
  <g class="node"><rect x="60" y="92" width="210" height="92" rx="10"/><rect x="370" y="92" width="300" height="92" rx="10"/><rect x="775" y="92" width="240" height="92" rx="10"/></g>
  <g text-anchor="middle" fill="#f4f2e9" class="label"><text x="165" y="132">ROUTER</text><text x="165" y="158" class="small mono" fill="#8cf59b">CUDA</text><text x="520" y="132">EXPERT MATMULS</text><text x="520" y="158" class="small mono" fill="#bf665e">CPU BOTTLENECK</text><text x="895" y="132">COPY RESULT</text><text x="895" y="158" class="small mono">BACK TO CUDA</text></g>
  <g fill="none" stroke="#bf665e" stroke-width="5" stroke-dasharray="9 8"><path d="M270 138h92"/><path d="M670 138h97"/></g><text x="1090" y="144" fill="#bf665e" class="small mono">BOUNDARY x2</text>
  <g class="node"><rect class="hot" x="60" y="315" width="210" height="106" rx="10"/><rect class="hot" x="370" y="315" width="300" height="106" rx="10"/><rect class="hot" x="775" y="315" width="240" height="106" rx="10"/></g>
  <g text-anchor="middle" fill="#f4f2e9" class="label"><text x="165" y="359">ROUTER</text><text x="165" y="387" class="small mono" fill="#8cf59b">CUDA</text><text x="520" y="352">COMPLETE Q6</text><text x="520" y="378">EXPERT BANKS</text><text x="520" y="401" class="small mono" fill="#8cf59b">PERSISTENT CUDA</text><text x="895" y="359">OUTPUT</text><text x="895" y="387" class="small mono" fill="#8cf59b">STAYS NEAR CUDA</text></g>
  <g fill="none" stroke="#8cf59b" stroke-width="5" filter="url(#glow)"><path d="M270 368h92"/><path d="M670 368h97"/></g><circle cx="316" cy="368" r="6" fill="#d6a84a"/><circle cx="719" cy="368" r="6" fill="#d6a84a"/><text x="1090" y="374" fill="#d6a84a" class="small mono">ONE CUDA ROUTE</text>
</svg>
