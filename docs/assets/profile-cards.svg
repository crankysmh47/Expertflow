<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc"><title id="title">ExpertFlow product interfaces</title><desc id="desc">Evidence replay, live placement, and OpenAI-compatible serving are connected parts of the ExpertFlow workflow.</desc><rect width="1200" height="420" rx="24" fill="#101311"/><style>text{font-family:Segoe UI,Arial,sans-serif}.m{font-family:Consolas,monospace}.h{font-size:27px;font-weight:800}.n{font-size:20px;font-weight:700}.s{font-size:14px}</style><text x="58" y="60" class="h" fill="#f4f2e9">THREE PORTS. ONE MEASURED PLACEMENT.</text><path d="M110 218h980" stroke="#4fbf68" stroke-width="4"/><g fill="#0b3d20" stroke="#d6a84a" stroke-width="3"><circle cx="220" cy="218" r="82"/><circle cx="600" cy="218" r="82"/><circle cx="980" cy="218" r="82"/></g><g text-anchor="middle"><text x="220" y="205" class="n" fill="#f4f2e9">REPLAY</text><text x="220" y="235" class="m s" fill="#8cf59b">NO GPU REQUIRED</text><text x="600" y="205" class="n" fill="#f4f2e9">PLACE</text><text x="600" y="235" class="m s" fill="#8cf59b">28.13 TPS</text><text x="980" y="205" class="n" fill="#f4f2e9">SERVE</text><text x="980" y="235" class="m s" fill="#8cf59b">OPENAI-COMPATIBLE</text></g><g class="m s" fill="#9fb9a5" text-anchor="middle"><text x="220" y="337">expertflow demo --replay</text><text x="600" y="337">expertflow run deployment.json</text><text x="980" y="337">expertflow serve deployment.json</text></g><circle cx="410" cy="218" r="8" fill="#d6a84a"/><circle cx="790" cy="218" r="8" fill="#d6a84a"/></svg>
